# Claude Code PR Review
#
# Automated code review on pull requests using Claude Code in headless mode.
# Requires ANTHROPIC_API_KEY secret to be set in repository settings.
#
# To enable:
# 1. Set ANTHROPIC_API_KEY in Settings > Secrets and variables > Actions
# 2. Uncomment the workflow below
# 3. Adjust the review prompt to match your team's standards

name: Claude PR Review

on:
  pull_request:
    branches: [main]

