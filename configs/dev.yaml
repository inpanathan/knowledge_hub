# Development environment configuration
# Overrides are merged on top of defaults from Settings class.

app_env: dev
app_debug: true
use_mocks: true

logging:
  level: DEBUG
  format: console

server:
  host: "127.0.0.1"
  port: 8000
  reload: true
  workers: 1

google_drive:
  credentials_file: "configs/gdrive_credentials.json"
  token_file: "data/gdrive_token.json"
  folder_id: ""

books:
  storage_dir: "data/books/"
  covers_dir: "data/covers/"
  database_path: "data/catalog.db"
