# Local GPU stack configuration
# Requires: vLLM server + Qdrant Docker container
# Start with: bash scripts/start_qdrant.sh && bash scripts/start_vllm.sh

model_backend: local
app_debug: true

embedding:
  model_name: "BAAI/bge-large-en-v1.5"
  dimension: 1024

llm:
  vllm_base_url: "http://localhost:8000/v1"
  vllm_model: "Qwen/Qwen2.5-14B-Instruct"
  temperature: 0.3
  max_tokens: 1024
  timeout_seconds: 120

vector_store:
  url: "http://localhost:6333"
  collection_name: "knowledge_hub"

logging:
  level: "INFO"
  format: "console"

google_drive:
  credentials_file: "configs/gdrive_credentials.json"
  token_file: "data/gdrive_token.json"
  folder_id: ""

books:
  storage_dir: "/opt/document-store/books/"
  covers_dir: "/opt/document-store/covers/"
  database_path: "data/catalog.db"
