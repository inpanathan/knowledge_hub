# Local GPU stack configuration
# Requires: vLLM server + Qdrant Docker container
#
# Single-node: bash scripts/start_qdrant.sh && bash scripts/start_vllm.sh
# Multi-node K8s: bash scripts/start_vllm_k8s.sh deploy
#
# For K8s pipeline-parallel mode, use port-forward or set vllm_base_url to NodePort:
#   Port-forward: bash scripts/start_vllm_k8s.sh forward  (keeps localhost:8001)
#   NodePort:     change vllm_base_url to http://<node-ip>:30801/v1

model_backend: local
app_debug: true

embedding:
  model_name: "BAAI/bge-large-en-v1.5"
  dimension: 1024

llm:
  vllm_base_url: "http://localhost:8001/v1"
  vllm_model: "Qwen/Qwen2.5-14B-Instruct-AWQ"
  temperature: 0.3
  max_tokens: 1024
  timeout_seconds: 120

vector_store:
  url: "http://localhost:6333"
  collection_name: "knowledge_hub"

logging:
  level: "INFO"
  format: "console"

google_drive:
  credentials_file: "configs/gdrive_credentials.json"
  token_file: "data/gdrive_token.json"
  folder_id: ""

books:
  storage_dir: "/opt/document-store/books/"
  covers_dir: "/opt/document-store/covers/"
  database_path: "data/catalog.db"

neo4j:
  url: "bolt://localhost:7687"
  user: "neo4j"
  password: ""
  database: "knowledgehub"
